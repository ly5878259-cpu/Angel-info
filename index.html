<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel Neon UI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
    height: 100vh;
    background: radial-gradient(circle at center, #0a0f2c, #000);
    color: white;
    overflow: hidden;
}

/* GLOW BACKGROUND EFFECT */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(0,200,255,0.2), transparent 70%);
    filter: blur(80px);
}

/* MAIN LAYOUT */
.container {
    position: relative;
    z-index: 2;
    height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;

    padding: 20px;

    flex-wrap: nowrap;
    overflow-x: auto;
}

/* COMMON PANEL STYLE */
.box {
    min-width: 300px;
    max-width: 350px;
    padding: 25px;

    border-radius: 20px;
    backdrop-filter: blur(20px);

    background: rgba(0,0,40,0.4);
    border: 1px solid rgba(0,200,255,0.3);

    box-shadow:
        0 0 20px rgba(0,200,255,0.5),
        inset 0 0 20px rgba(0,200,255,0.2);

    transition: 0.3s;
}

/* HOVER GLOW */
.box:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow:
        0 0 40px rgba(0,200,255,1),
        inset 0 0 30px rgba(0,200,255,0.5);
}

/* TITLES */
h1, h2 {
    text-align: center;
    margin-bottom: 15px;
    text-shadow: 0 0 15px #00c6ff;
}

/* TEXT */
p {
    text-align: center;
    opacity: 0.8;
    margin-bottom: 20px;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: 16px;

    background: linear-gradient(90deg, #00c6ff, #7b2cff);
    color: white;

    box-shadow: 0 0 15px #00c6ff;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #00c6ff;
}

/* API SPECIAL COLOR */
.api {
    border: 1px solid #00ffae;
    box-shadow: 0 0 20px #00ffae;
}

.api h2 {
    color: #00ffae;
    text-shadow: 0 0 15px #00ffae;
}

/* USERSCRIPT */
.script {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}

/* SCROLL BAR */
.container::-webkit-scrollbar {
    height: 6px;
}
.container::-webkit-scrollbar-thumb {
    background: #00c6ff;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT: FREE API -->
    <div class="box api" onclick="window.location.href='https://test-hub.kys.gay/bypass?url='">
        <h2>🚀 FREE API</h2>
        <p>Click to access powerful bypass API</p>
    </div>

    <!-- CENTER: DISCORD -->
    <div class="box">
        <h1>🪽 Angel Community</h1>
        <p>Join our Discord for scripts, updates, and tools</p>

        <button class="btn" onclick="window.location.href='https://discord.gg/Td27T6uR9b'">
            Join Discord
        </button>
    </div>

    <!-- RIGHT: USERSCRIPT -->
    <div class="box">
        <h2>💻 Userscripts</h2>

        <div class="script">
            <p>Bypass Script</p>
            <button class="btn" onclick="window.location.href='https://raw.githubusercontent.com/ly5878259-cpu/Angel-userscript/main/Userscript/Angel-userscript.js'">
                View on GitHub
            </button>
        </div>

        <div class="script">
            <p>More Scripts</p>
            <button class="btn" onclick="window.location.href='https://raw.githubusercontent.com/ly5878259-cpu/Angel-userscript/main/Userscript/Angel-userscript.js'">
                Open Repo
            </button>
        </div>
    </div>

</div>

</body>
</html>
