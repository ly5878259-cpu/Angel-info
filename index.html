<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel UI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1520975922203-b9f5f3d6c63f?auto=format&fit=crop&w=1600&q=80') no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

/* blur overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(12px);
    background: rgba(0,0,20,0.6);
}

/* MAIN CENTER CARD */
.card {
    position: relative;
    width: 400px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(0,0,40,0.6);
    backdrop-filter: blur(20px);
    text-align: center;
    box-shadow: 0 0 30px rgba(0, 170, 255, 0.6);
    z-index: 2;
}

/* Discord style */
.card h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

.card p {
    opacity: 0.7;
    margin-bottom: 20px;
}

.join-btn {
    background: linear-gradient(90deg, #00c6ff, #7b2cff);
    border: none;
    padding: 15px;
    width: 100%;
    border-radius: 12px;
    font-size: 18px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.join-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00c6ff;
}

/* LEFT FREE API BUTTON */
.api-btn {
    position: absolute;
    left: 40px;
    top: 50%;
    transform: translateY(-50%);
    padding: 20px 30px;
    border-radius: 15px;
    background: rgba(0,255,150,0.2);
    border: 2px solid #00ffae;
    color: #00ffae;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 20px #00ffae;
    transition: 0.3s;
}

.api-btn:hover {
    background: #00ffae;
    color: black;
}

/* RIGHT USERSCRIPT PANEL */
.panel {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(0,0,50,0.6);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 20px #4da6ff;
}

.panel h2 {
    margin-bottom: 15px;
    font-size: 18px;
}

.script {
    margin-bottom: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

.install-btn {
    margin-top: 10px;
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #4da6ff;
    color: white;
    cursor: pointer;
}

/* glow effect */
.glow {
    text-shadow: 0 0 10px #00c6ff;
}

</style>
</head>

<body>

<!-- FREE API BUTTON -->
<button class="api-btn" onclick="window.location.href='https://test-hub.kys.gay/bypass?url='">
    FREE API
</button>

<!-- CENTER CARD -->
<div class="card">
    <h1 class="glow">Angel Community</h1>
    <p>Discord Server • Scripts • API</p>

    <button class="join-btn" onclick="window.location.href='https://discord.gg/Td27T6uR9b'">
        Join Discord
    </button>
</div>

<!-- RIGHT PANEL -->
<div class="panel">
    <h2>Userscripts</h2>

    <div class="script">
        <p>Bypass Script</p>
        <button class="install-btn" onclick="window.location.href='https://raw.githubusercontent.com/ly5878259-cpu/Angel-userscript/main/Userscript/Angel-userscript.js'">
            View on GitHub
        </button>
    </div>

    <div class="script">
        <p>More Scripts</p>
        <button class="install-btn" onclick="window.location.href='https://raw.githubusercontent.com/ly5878259-cpu/Angel-userscript/main/Userscript/Angel-userscript.js'">
            Open Repo
        </button>
    </div>
</div>

</body>
</html>
